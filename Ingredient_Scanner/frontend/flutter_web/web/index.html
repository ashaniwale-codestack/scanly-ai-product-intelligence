<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/@zxing/library@0.19.1"></script>
  <style>
 body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f9f9f9;
  }

  .container {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  .camera-column {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #000;
  position: relative; /* important for overlay positioning */
  border-right: 2px solid #ccc;
}

.overlay-logo {
  position: absolute;
  top: 20px;
  left: 20px;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 40px;
  font-weight: bold;
  color: #00ff99;       /* bright neon green */
  text-shadow: 2px 2px 6px rgba(0,0,0,0.7); /* adds depth */
  opacity: 0.85;
  pointer-events: none;  /* won’t block camera clicks */
}

.overlay-logo img {
  width: 120px; /* adjust as needed */
  height: auto;
  opacity: 0.9;
}

  video {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .message-column {
  flex: 1;
  padding: 20px;
  background: linear-gradient(160deg, #f1f1f1, #e0f7ff);
  overflow-y: auto;
  border-left: 3px solid #00ff99;
}

#message {
  font-size: 24px;
  font-weight: 500;
  color: #333;
  margin-bottom: 12px;
  min-height: 40px;
}

.ingredient {
  margin: 10px 0;
  padding: 10px;
  background-color: #e0ffe0;
  border-radius: 8px;
  border-left: 4px solid #00aa00;
  transition: transform 0.2s;
}

.ingredient:hover {
  transform: scale(1.03);
  background-color: #ccffcc;
}
table {
  border-radius: 8px;
  overflow: hidden;
}

#ingredients > div:last-child {
  border-radius: 8px;
}
.message-column {
  scroll-behavior: smooth;
}
  select {
    margin-bottom: 10px;
    padding: 6px 8px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #ccc;
    background-color: #fff;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
    background-color: #f0f8ff;
  }

  table th, table td {
    border: 1px solid #90caf9;
    padding: 6px;
    text-align: left;
  }

  table th {
    background-color: #b3e5fc;
  }

  /* subtle highlight for raw data */
  #ingredients > div:last-child {
    margin-top: 16px;
    font-size: 14px;
    background: #fffbe0;
    border: 1px solid #ffeb3b;
    padding: 8px;
    border-radius: 5px;
  }
  </style>
</head>
<body>
   
  <div class="container">
    <div class="camera-column">
      <video id="videoPreview" autoplay></video>
      <div class="overlay-logo">Scanly</div>
    </div>
    <div class="message-column">
      <div>
        <label for="langSelect">Select Language: </label>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>          
          <option value="hi">Hindi</option>
        </select>
      </div>
      <div id="message">Snap the barcode, know your food.</div>
      <div id="ingredients"></div>
    </div>
  </div>
  <script>

    //     i18n = await res.json();
    //     updateLabels();
    //   } catch (err) {
    //     console.error("Failed to load i18n file", err);
    //   }

      document.getElementById("message").innerText = i18n.scan_message;
      document.querySelector("label[for='langSelect']").innerText = i18n.select_language + ":";
      // Update other static labels if needed
    }

    document.getElementById("langSelect").addEventListener("change", async () => {
      const lang = document.getElementById("langSelect").value;
      lastBarcode = null; // reset so product is fetched in new language
        if (lastBarcode) {
        fetchProductInLanguage(lastBarcode, lang);
         }
      //await loadLanguage(lang);
    });

    // Initialize labels on page load
    //loadLanguage(document.getElementById("langSelect").value);
    const messages = [
  "🔍 Point, Scan, Discover!",
  "🍎 Know your food instantly",
  "Your nutrition, one scan away",
  "Scan it. Know it. Love it."
];

let msgIndex = 0;
setInterval(() => {
  document.getElementById("message").innerText = messages[msgIndex];
  msgIndex = (msgIndex + 1) % messages.length;
}, 3000); // changes every 3 seconds
  </script>
  <script>
    const codeReader = new ZXing.BrowserMultiFormatReader();

    async function startScanner() {
      try {
        const devices = await codeReader.listVideoInputDevices();
        if (devices.length === 0) {
          document.getElementById("message").innerText = "No camera devices found";
          return;
        }
        const deviceId = devices[0].deviceId;

        let lastBarcode = null;

        codeReader.decodeFromVideoDevice(deviceId, "videoPreview", async (result, err) => {
          if (result) {
            const barcode = result.text;
            if (barcode !== lastBarcode) {
              lastBarcode = barcode;

              const lang = document.getElementById("langSelect").value;

              document.getElementById("message").innerText = "Scanned: " + barcode + " — fetching data...";
              const ingDiv = document.getElementById("ingredients");
              ingDiv.innerHTML = ""; // Clear previous ingredients

              try {
                const response = await fetch(`http://127.0.0.1:8000/product/${encodeURIComponent(barcode)}?lang=${lang}`);
                if (!response.ok) throw new Error("Network response was not ok");

                const data = await response.json();

                if (data.error) {
                  document.getElementById("message").innerText = "Product not found";
                  ingDiv.innerHTML = "";
                } else {
                  document.getElementById("message").innerText = "Product: " + (data.name ?? "Unknown");

                  let ingredients = data.ingredients;
                  if (!ingredients || ingredients.toLowerCase() === "not available") {
                    if (data.raw && data.raw.ingredients_text) {
                      ingredients = data.raw.ingredients_text;
                    } else {
                      ingredients = "Ingredients not available";
                    }
                  }

                  ingDiv.innerHTML = '<div class="ingredient">' + ingredients + '</div>';

                  if (data.raw && data.raw.nutriments) {
                    const nutriments = data.raw.nutriments;
                    let tableHtml = '<table style="margin-top:16px;border-collapse:collapse;width:100%;background:#eaf7ff;">';
                    tableHtml += '<tr style="background:#bde0fe;"><th style="border:1px solid #90caf9;padding:6px;">Nutrient</th><th style="border:1px solid #90caf9;padding:6px;">Value</th></tr>';
                    for (const [key, value] of Object.entries(nutriments)) {
                      tableHtml += `<tr><td style="border:1px solid #90caf9;padding:6px;">${key}</td><td style="border:1px solid #90caf9;padding:6px;">${value}</td></tr>`;
                    }
                    tableHtml += '</table>';
                    ingDiv.innerHTML += tableHtml;
                  }

                  const rawDiv = document.createElement('div');
                  rawDiv.style.marginTop = '16px';
                  rawDiv.style.fontSize = '14px';
                  rawDiv.style.background = '#fffbe0';
                  rawDiv.style.border = '1px solid #ff0';
                  rawDiv.style.padding = '8px';
                  rawDiv.style.borderRadius = '5px';
                  rawDiv.innerText = 'Raw value: ' + JSON.stringify(data.raw, null, 2);
                  ingDiv.appendChild(rawDiv);
                }

              } catch (fetchError) {
                console.error("Fetch error:", fetchError);
                document.getElementById("message").innerText = "Error fetching product data";
                ingDiv.innerHTML = "";
              }
            }
          }
          if (err && !(err instanceof ZXing.NotFoundException)) {
            console.error(err);
          }
        });

        // Reset lastBarcode when language changes so it refetches
        document.getElementById("langSelect").addEventListener("change", () => {
          lastBarcode = null;
          let currentLang = 'en';
        });

      } catch (e) {
        console.error(e);
        document.getElementById("message").innerText = "Error initializing scanner";
      }
    }

    startScanner();
  </script>
</body>
</html>
